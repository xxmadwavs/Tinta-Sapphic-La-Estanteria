<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin ~ Tinta Sapphic</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0e0b10;--surface:#16121a;--surface2:#1e1924;--surface3:#251f2e;
  --border:rgba(180,120,200,0.1);--border2:rgba(180,120,200,0.22);
  --text:#f0eaf5;--muted:#8a7898;
  --accent:#c06fc4;--accent2:#da99de;--accent-soft:rgba(192,111,196,0.12);
  --rose:#d4607a;--rose-soft:rgba(212,96,122,0.12);
  --gold:#c9975a;--gold-soft:rgba(201,151,90,0.12);
  --teal:#5bbcb0;
  --radius:14px;--radius-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(192,111,196,0.06) 0%,transparent 55%);pointer-events:none;z-index:0}

.topbar{position:sticky;top:0;z-index:100;background:rgba(14,11,16,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border2);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;display:flex;align-items:baseline;gap:.3em}
.logo-tinta{font-weight:700;letter-spacing:.12em;font-size:.88em;text-transform:uppercase}
.logo em{font-style:italic;font-weight:600;color:var(--accent)}
.logo-badge{font-family:'Instrument Sans',sans-serif;font-size:10px;padding:2px 10px;border-radius:20px;background:rgba(212,96,122,0.18);color:var(--rose);border:1px solid rgba(212,96,122,0.3);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-left:.5rem}
.topbar-actions{display:flex;gap:8px}

.container{max-width:1000px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}
.page-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;margin-bottom:.2rem}
.page-title em{font-style:italic;color:var(--accent)}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:2rem}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;line-height:1}
.stat-num em{font-style:italic;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

.card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem}
.card-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:1.2rem;font-weight:600}

.book-list{display:grid;gap:.6rem}
.book-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.1rem;display:flex;align-items:center;gap:1rem;transition:all .18s}
.book-item:hover{border-color:var(--border2)}
.book-thumb{width:38px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
.book-thumb-ph{width:38px;height:56px;border-radius:8px;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;color:var(--muted)}
.book-info{flex:1;min-width:0}
.book-name{font-size:14.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.book-meta{font-size:12px;color:var(--muted);margin-top:1px}
.book-actions{display:flex;gap:6px;flex-shrink:0}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-genre{background:var(--accent-soft);color:var(--accent2);border:1px solid rgba(192,111,196,0.2)}

.btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;font-size:12.5px;font-family:'Instrument Sans',sans-serif;font-weight:500;background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent2)}
.btn.danger{color:var(--rose);border-color:rgba(212,96,122,0.3)}
.btn.danger:hover{background:var(--rose-soft)}
.btn.small{padding:4px 12px;font-size:11.5px}
.btn:disabled{opacity:.5;cursor:not-allowed}

.modal-bg{position:fixed;inset:0;background:rgba(8,5,10,0.75);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:300;padding:2rem 1rem;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:560px;margin:auto;padding:2rem;box-shadow:0 32px 80px rgba(0,0,0,0.6);position:relative}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;font-style:italic;margin-bottom:1.4rem}
.modal-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.modal-close:hover{background:var(--rose);border-color:var(--rose);color:#fff}

.form-row{margin-bottom:12px}
.form-label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13.5px;font-family:'Instrument Sans',sans-serif;outline:none;transition:border-color .15s}
.form-row textarea{resize:vertical;min-height:80px;line-height:1.55}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row input::placeholder,.form-row textarea::placeholder{color:var(--muted)}
.form-row-half{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:1.4rem;padding-top:1rem;border-top:1px solid var(--border)}

.tag-input-wrap{display:flex;flex-wrap:wrap;gap:.35rem;padding:8px 10px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);min-height:42px;align-items:center;cursor:text;transition:border-color .15s}
.tag-input-wrap:focus-within{border-color:var(--accent)}
.tag-pill{display:flex;align-items:center;gap:4px;padding:2px 10px;border-radius:20px;background:var(--accent-soft);border:1px solid rgba(192,111,196,0.25);font-size:12px;color:var(--accent2);white-space:nowrap}
.tag-pill.rose{background:var(--rose-soft);border-color:rgba(212,96,122,0.25);color:#e0909e}
.tag-pill button{background:transparent;border:none;color:inherit;cursor:pointer;font-size:13px;padding:0;line-height:1;opacity:.7}
.tag-pill button:hover{opacity:1}
.tag-bare-input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Instrument Sans',sans-serif;min-width:80px;flex:1}

.spicy-selector{display:flex;gap:.4rem;margin-top:4px;flex-wrap:wrap}
.spicy-opt{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:13px;font-family:'Instrument Sans',sans-serif;cursor:pointer;transition:all .15s}
.spicy-opt:hover{border-color:var(--gold);color:var(--gold)}
.spicy-opt.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.spicy-opt.none.active{background:var(--surface3);border-color:var(--border2);color:var(--muted)}

.cover-row{display:flex;gap:10px;align-items:flex-start}
.cover-preview{width:50px;height:74px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);display:none;flex-shrink:0}

.export-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem}
.export-instructions{font-size:13px;color:var(--muted);line-height:1.8}
.export-instructions strong{color:var(--text)}
.export-instructions ol{padding-left:1.2rem;margin-top:.4rem}
code{background:rgba(192,111,196,0.1);color:var(--accent2);padding:1px 7px;border-radius:6px;font-size:12px;font-family:monospace}

.toast{position:fixed;bottom:2rem;right:2rem;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--teal);color:var(--bg)}
.toast.error{background:var(--rose);color:#fff}
.empty{text-align:center;color:var(--muted);padding:2.5rem;font-style:italic}

/* LOGIN SCREEN */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center}
.login-box-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-style:italic;margin-bottom:.3rem}
.login-box-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.login-box input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13.5px;font-family:'Instrument Sans',sans-serif;outline:none;transition:border-color .15s;margin-bottom:.6rem}
.login-box input:focus{border-color:var(--accent)}
.login-box input::placeholder{color:var(--muted)}
.login-box .btn-primary{width:100%;padding:11px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:13.5px;font-weight:600;font-family:'Instrument Sans',sans-serif;cursor:pointer;transition:all .18s}
.login-box .btn-primary:hover{background:var(--accent2)}
.login-box-error{font-size:12px;color:var(--rose);margin-top:.5rem;min-height:16px}

@media(max-width:600px){.container{padding:1.25rem 1rem 3rem}.topbar{padding:0 1rem}.form-row-half{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ADMIN LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-box-title">Área admin</div>
    <p class="login-box-sub">Acceso solo para administradoras de Tinta Sapphic.</p>
    <input type="email" id="adminEmail" placeholder="Email de admin" autocomplete="email">
    <input type="password" id="adminPass" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-primary" onclick="adminLogin()">Entrar</button>
    <div class="login-box-error" id="loginError"></div>
  </div>
</div>

<nav class="topbar" style="display:none" id="mainTopbar">
  <div class="logo">
    <span class="logo-tinta">Tinta</span>
    <em>Sapphic</em>
    <span class="logo-badge">Admin</span>
  </div>
  <div class="topbar-actions">
    <button class="btn small" onclick="adminLogout()">Salir</button>
    <button class="btn primary small" onclick="openAddModal()">+ Añadir libro</button>
  </div>
</nav>

<div class="container" id="mainContainer" style="display:none">
  <h1 class="page-title">Panel de <em>libros</em></h1>
  <p class="page-sub">Gestiona el catálogo que verán las lectoras. Los cambios se guardan directamente en la base de datos.</p>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="sTotal"><em>—</em></div><div class="stat-label">Libros</div></div>
    <div class="stat-card"><div class="stat-num" id="sVotes"><em>—</em></div><div class="stat-label">Valoraciones</div></div>
    <div class="stat-card"><div class="stat-num" id="sGenres"><em>—</em></div><div class="stat-label">Géneros</div></div>
    <div class="stat-card"><div class="stat-num" id="sAuthors"><em>—</em></div><div class="stat-label">Autoras</div></div>
  </div>

  <div class="card">
    <div class="card-title">Catálogo de libros</div>
    <div id="bookList"><div class="empty">Cargando…</div></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="bookModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Nuevo libro</div>

    <div class="form-row">
      <label class="form-label">Título *</label>
      <input type="text" id="fTitle" placeholder="Título del libro">
    </div>
    <div class="form-row-half">
      <div class="form-row">
        <label class="form-label">Autora *</label>
        <input type="text" id="fAuthor" placeholder="Nombre y apellidos">
      </div>
      <div class="form-row">
        <label class="form-label">Año</label>
        <input type="number" id="fYear" placeholder="2024" min="1800" max="2100">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Portada (URL)</label>
      <div class="cover-row">
        <div style="flex:1">
          <input type="url" id="fCover" placeholder="https://…" oninput="previewCover(this.value)">
        </div>
        <img id="coverPreview" class="cover-preview" alt="Portada" onerror="this.style.display='none'">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Géneros</label>
      <div class="tag-input-wrap" id="genreWrap" onclick="document.getElementById('genreInput').focus()">
        <input class="tag-bare-input" id="genreInput" placeholder="Escribe y pulsa Enter…" onkeydown="handleTag(event,'genres','genreWrap','genreInput',false)">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Tropos</label>
      <div class="tag-input-wrap" id="tropeWrap" onclick="document.getElementById('tropeInput').focus()">
        <input class="tag-bare-input" id="tropeInput" placeholder="Escribe y pulsa Enter…" onkeydown="handleTag(event,'tropes','tropeWrap','tropeInput',true)">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Nivel Spicy 🌶</label>
      <div class="spicy-selector" id="spicySel">
        <button class="spicy-opt none active" data-v="0" onclick="setSpicy(0)">Sin spicy</button>
        <button class="spicy-opt" data-v="1" onclick="setSpicy(1)">🌶</button>
        <button class="spicy-opt" data-v="2" onclick="setSpicy(2)">🌶🌶</button>
        <button class="spicy-opt" data-v="3" onclick="setSpicy(3)">🌶🌶🌶</button>
        <button class="spicy-opt" data-v="4" onclick="setSpicy(4)">🌶🌶🌶🌶</button>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Sinopsis</label>
      <textarea id="fSynopsis" placeholder="Descripción del libro…" rows="4"></textarea>
    </div>
    <div class="form-row-half">
      <div class="form-row">
        <label class="form-label">Páginas</label>
        <input type="number" id="fPages" placeholder="320">
      </div>
      <div class="form-row">
        <label class="form-label">ISBN</label>
        <input type="text" id="fIsbn" placeholder="978-…">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="saveBtn" onclick="saveBook()">Guardar libro</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://fteitflirsmabcasmwij.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2xi9ELv252qAXY_Fx3ADZg_nuWtgcUA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// IMPORTANT: Set your admin email here
const ADMIN_EMAIL = 'xxalittledreamxx@gmail.com';

let books = [], editingId = null, currentSpicy = 0;
let currentTags = {genres:[], tropes:[]};

async function adminLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const pass = document.getElementById('adminPass').value;
  if(!email||!pass){document.getElementById('loginError').textContent='Rellena los campos.';return;}
  const {error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){document.getElementById('loginError').textContent='Credenciales incorrectas.';return;}
  const {data:{session}} = await sb.auth.getSession();
  if(session.user.email !== ADMIN_EMAIL){
    await sb.auth.signOut();
    document.getElementById('loginError').textContent='Esta cuenta no tiene acceso de admin.';
    return;
  }
  showMainUI();
  await loadData();
}

async function checkSession() {
  const {data:{session}} = await sb.auth.getSession();
  if(session && session.user.email === ADMIN_EMAIL) {
    showMainUI();
    await loadData();
  }
}

function showMainUI() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainTopbar').style.display='flex';
  document.getElementById('mainContainer').style.display='';
}

async function adminLogout() {
  await sb.auth.signOut();
  location.reload();
}

async function loadData() {
  const {data} = await sb.from('books').select('*').order('title');
  books = data||[];
  const {data:rData} = await sb.from('ratings').select('book_id');
  const voteCounts = {};
  if(rData) rData.forEach(r=>{voteCounts[r.book_id]=(voteCounts[r.book_id]||0)+1;});

  const genres = new Set(books.flatMap(b=>b.genres||[]));
  const authors = new Set(books.map(b=>b.author).filter(Boolean));
  const totalVotes = Object.values(voteCounts).reduce((a,b)=>a+b,0);
  document.getElementById('sTotal').innerHTML=`<em>${books.length}</em>`;
  document.getElementById('sVotes').innerHTML=`<em>${totalVotes}</em>`;
  document.getElementById('sGenres').innerHTML=`<em>${genres.size}</em>`;
  document.getElementById('sAuthors').innerHTML=`<em>${authors.size}</em>`;

  const list = document.getElementById('bookList');
  if(!books.length){list.innerHTML='<div class="empty">Todavía no hay libros. ¡Añade el primero!</div>';return;}
  list.innerHTML = `<div class="book-list">${books.map(b=>{
    const cover = b.cover
      ? `<img class="book-thumb" src="${b.cover}" alt="" onerror="this.outerHTML='<div class=book-thumb-ph>📖</div>'">`
      : `<div class="book-thumb-ph">📖</div>`;
    const genreBadges = (b.genres||[]).slice(0,2).map(g=>`<span class="badge badge-genre">${g}</span>`).join('');
    const spicyLabel = b.spicy?`<span class="badge" style="background:var(--gold-soft);color:var(--gold);border:1px solid rgba(201,151,90,0.2)">${'🌶'.repeat(b.spicy)}</span>`:'';
    const votes = voteCounts[b.id]||0;
    return `<div class="book-item">
      ${cover}
      <div class="book-info">
        <div class="book-name">${b.title} ${genreBadges}${spicyLabel}</div>
        <div class="book-meta">${b.author||'—'}${b.year?' · '+b.year:''} · ${votes} voto${votes!==1?'s':''}</div>
      </div>
      <div class="book-actions">
        <button class="btn small" onclick="openEditModal('${b.id}')">Editar</button>
        <button class="btn small danger" onclick="deleteBook('${b.id}')">Borrar</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function openAddModal() {
  editingId=null; clearForm();
  document.getElementById('modalTitle').textContent='Nuevo libro';
  document.getElementById('bookModal').classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
}

function openEditModal(id) {
  const b=books.find(bk=>bk.id===id);
  if(!b) return;
  editingId=id; clearForm();
  document.getElementById('modalTitle').textContent='Editar libro';
  document.getElementById('fTitle').value=b.title||'';
  document.getElementById('fAuthor').value=b.author||'';
  document.getElementById('fYear').value=b.year||'';
  document.getElementById('fCover').value=b.cover||'';
  document.getElementById('fSynopsis').value=b.synopsis||'';
  document.getElementById('fPages').value=b.pages||'';
  document.getElementById('fIsbn').value=b.isbn||'';
  previewCover(b.cover||'');
  currentTags.genres=[...(b.genres||[])];
  currentTags.tropes=[...(b.tropes||[])];
  setSpicy(b.spicy||0);
  renderTagWrap('genres','genreWrap','genreInput',false);
  renderTagWrap('tropes','tropeWrap','tropeInput',true);
  document.getElementById('bookModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function clearForm() {
  ['fTitle','fAuthor','fYear','fCover','fSynopsis','fPages','fIsbn'].forEach(id=>document.getElementById(id).value='');
  currentTags={genres:[],tropes:[]};
  setSpicy(0);
  renderTagWrap('genres','genreWrap','genreInput',false);
  renderTagWrap('tropes','tropeWrap','tropeInput',true);
  const p=document.getElementById('coverPreview');p.style.display='none';p.src='';
}

function closeModal() {
  document.getElementById('bookModal').classList.remove('open');
  document.body.style.overflow='';
}

async function saveBook() {
  const title=document.getElementById('fTitle').value.trim();
  const author=document.getElementById('fAuthor').value.trim();
  if(!title){showToast('El título es obligatorio','error');return;}
  if(!author){showToast('La autora es obligatoria','error');return;}
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Guardando…';

  const bookData={
    title, author,
    year:parseInt(document.getElementById('fYear').value)||null,
    cover:document.getElementById('fCover').value.trim()||null,
    synopsis:document.getElementById('fSynopsis').value.trim()||null,
    pages:parseInt(document.getElementById('fPages').value)||null,
    isbn:document.getElementById('fIsbn').value.trim()||null,
    genres:currentTags.genres,
    tropes:currentTags.tropes,
    spicy:currentSpicy,
  };

  let error;
  if(editingId) {
    ({error}=await sb.from('books').update(bookData).eq('id',editingId));
  } else {
    ({error}=await sb.from('books').insert(bookData));
  }

  btn.disabled=false;btn.textContent='Guardar libro';
  if(error){showToast('Error: '+error.message,'error');return;}
  closeModal();
  await loadData();
  showToast(editingId?'Libro actualizado ✓':'Libro añadido ✓');
}

async function deleteBook(id) {
  if(!confirm('¿Borrar este libro? También se borrarán todas sus valoraciones.')) return;
  const {error}=await sb.from('books').delete().eq('id',id);
  if(error){showToast('Error al borrar','error');return;}
  await loadData();
  showToast('Libro eliminado');
}

function handleTag(e,key,wrapId,inputId,isRose) {
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const val=e.target.value.trim().replace(/,$/,'').trim();
    if(val&&!currentTags[key].includes(val)){currentTags[key].push(val);renderTagWrap(key,wrapId,inputId,isRose);}
    e.target.value='';
  } else if(e.key==='Backspace'&&!e.target.value&&currentTags[key].length){
    currentTags[key].pop();renderTagWrap(key,wrapId,inputId,isRose);
  }
}

function renderTagWrap(key,wrapId,inputId,isRose) {
  const wrap=document.getElementById(wrapId);
  const pills=currentTags[key].map(t=>`<span class="tag-pill${isRose?' rose':''}">${t}<button onclick="removeTag('${key}','${t}','${wrapId}','${inputId}',${isRose})">×</button></span>`).join('');
  wrap.innerHTML=pills+`<input class="tag-bare-input" id="${inputId}" placeholder="${currentTags[key].length?'':'Escribe y pulsa Enter…'}" onkeydown="handleTag(event,'${key}','${wrapId}','${inputId}',${isRose})">`;
}

function removeTag(key,val,wrapId,inputId,isRose){currentTags[key]=currentTags[key].filter(t=>t!==val);renderTagWrap(key,wrapId,inputId,isRose);}

function setSpicy(v) {
  currentSpicy=v;
  document.querySelectorAll('#spicySel .spicy-opt').forEach(btn=>btn.classList.toggle('active',parseInt(btn.dataset.v)===v));
}

function previewCover(url) {
  const img=document.getElementById('coverPreview');
  if(url&&url.startsWith('http')){img.src=url;img.style.display='block';}else{img.style.display='none';img.src='';}
}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type}`;setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),3200);}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('bookModal').addEventListener('click',e=>{if(e.target.id==='bookModal')closeModal();});

checkSession();
</script>
</body>
</html>
